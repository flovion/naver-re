<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>네이버 부동산 아파트 조회</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Malgun Gothic', '맑은 고딕', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #03c75a 0%, #00a846 100%);
      color: #fff;
      padding: 18px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,.18);
    }
    header h1 { font-size: 1.35rem; font-weight: 700; }
    header p  { font-size: .82rem; opacity: .88; margin-top: 3px; }

    .container { max-width: 1000px; margin: 0 auto; padding: 24px 16px; }

    /* ── 검색 ── */
    .search-box { display: flex; gap: 8px; margin-bottom: 16px; }
    .search-box input {
      flex: 1; padding: 13px 16px;
      border: 2px solid #dde1e7; border-radius: 10px;
      font-size: 1rem; outline: none; background: #fff;
      transition: border-color .2s;
    }
    .search-box input:focus { border-color: #03c75a; }
    .search-box button {
      padding: 13px 26px; background: #03c75a; color: #fff;
      border: none; border-radius: 10px; font-size: 1rem;
      font-weight: 700; cursor: pointer; transition: background .2s;
      white-space: nowrap;
    }
    .search-box button:hover    { background: #00a846; }
    .search-box button:disabled { background: #aaa; cursor: not-allowed; }

    /* ── 카드 ── */
    .card {
      background: #fff; border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      padding: 20px; margin-bottom: 16px;
    }

    /* ── 즐겨찾기 ── */
    .fav-section-label {
      font-size: .82rem; font-weight: 700; color: #888;
      text-transform: uppercase; letter-spacing: .5px;
      margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
    }
    .fav-btn-header {
      background: none; border: none; font-size: 1.4rem;
      cursor: pointer; padding: 0 4px; line-height: 1;
      transition: transform .15s;
    }
    .fav-btn-header:hover { transform: scale(1.2); }
    .fav-btn-header.active { color: #f5a623; }

    /* ── 단지 목록 ── */
    .section-label {
      font-size: .82rem; font-weight: 700; color: #888;
      text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px;
    }
    .complex-list { list-style: none; }
    .complex-list li {
      padding: 12px 14px; border-radius: 9px; cursor: pointer;
      border: 1.5px solid transparent; transition: all .15s; margin-bottom: 6px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .complex-list li:hover { background: #f0fdf4; border-color: #03c75a; }
    .complex-list li .c-info { flex: 1; }
    .complex-list li .c-name { font-weight: 700; font-size: .95rem; }
    .complex-list li .c-addr { font-size: .82rem; color: #888; margin-top: 3px; }
    .complex-list li .c-meta { font-size: .78rem; color: #03c75a; margin-top: 4px; }
    .fav-del-btn {
      background: none; border: none; color: #ccc; font-size: 1.1rem;
      cursor: pointer; padding: 4px 8px; border-radius: 6px;
      transition: color .15s;
    }
    .fav-del-btn:hover { color: #e53935; }

    /* ── 선택 단지 헤더 ── */
    .complex-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 18px; }
    .badge {
      background: #03c75a; color: #fff;
      padding: 3px 10px; border-radius: 20px;
      font-size: .74rem; font-weight: 700; white-space: nowrap; margin-top: 3px;
    }
    .complex-header .info { flex: 1; }
    .complex-header .info .name-row {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .complex-header .info .name { font-size: 1.15rem; font-weight: 700; }
    .complex-header .info .addr { font-size: .83rem; color: #888; margin-top: 3px; }
    .complex-header .info .stats {
      font-size: .8rem; color: #555; margin-top: 8px;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 6px;
    }
    .stat-item {
      background: #f8f9fa; border-radius: 8px; padding: 6px 10px;
      font-size: .78rem; color: #666;
    }
    .stat-item span { color: #03c75a; font-weight: 600; display: block; margin-top: 2px; font-size: .85rem; }

    /* ── 평형 탭 ── */
    .tab-label { font-size: .82rem; font-weight: 700; color: #888; margin-bottom: 10px; }
    .pyeong-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
    .pyeong-tab {
      padding: 7px 15px; border: 2px solid #dde1e7;
      border-radius: 20px; cursor: pointer;
      font-size: .85rem; font-weight: 600; color: #555; background: #fff;
      transition: all .18s;
    }
    .pyeong-tab:hover  { border-color: #03c75a; color: #03c75a; }
    .pyeong-tab.active { background: #03c75a; border-color: #03c75a; color: #fff; }

    /* ── 섹션 제목 ── */
    .section-title {
      font-size: .9rem; font-weight: 700; color: #333;
      margin-bottom: 12px; display: flex; align-items: center; gap: 7px;
    }
    .section-title::before {
      content: ''; display: block; width: 3px; height: 15px;
      background: #03c75a; border-radius: 2px;
    }

    /* ── 가격 통계 ── */
    .price-stats {
      display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
    }
    .price-stat-box {
      flex: 1; min-width: 80px; background: #f8f9fa; border-radius: 10px;
      padding: 8px 12px; text-align: center;
    }
    .price-stat-box .ps-label { font-size: .72rem; color: #888; }
    .price-stat-box .ps-value { font-size: .9rem; font-weight: 700; color: #1565c0; margin-top: 3px; }
    .price-stat-box.avg .ps-value { color: #2e7d32; }
    .price-stat-box.high .ps-value { color: #c62828; }
    .price-stat-box.low .ps-value  { color: #1565c0; }

    /* ── 가격 그리드 ── */
    @media (min-width: 700px) {
      .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    }

    /* ── 테이블 ── */
    .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .price-table { width: 100%; border-collapse: collapse; font-size: .86rem; }
    .price-table th {
      background: #f8f9fa; padding: 9px 12px;
      text-align: left; font-weight: 600; color: #555;
      border-bottom: 2px solid #e9ecef; white-space: nowrap;
    }
    .price-table td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; color: #333; }
    .price-table tbody tr:last-child td { border-bottom: none; }
    .price-table tbody tr:hover td { background: #f8fff8; }
    .clickable-row { cursor: pointer; }
    .clickable-row:hover td { background: #e8f5e9 !important; }

    .price-red  { font-weight: 700; color: #c62828; }
    .price-blue { font-weight: 700; color: #1565c0; }
    .price-green { font-weight: 700; color: #2e7d32; }

    .tag {
      display: inline-block; padding: 2px 7px; border-radius: 4px;
      font-size: .74rem; font-weight: 700;
    }
    .tag-sell    { background: #fff3e0; color: #e65100; }
    .tag-charter { background: #f3e5f5; color: #6a1b9a; }
    .tag-rent    { background: #e3f2fd; color: #1565c0; }

    /* ── 상태 ── */
    .state-box { text-align: center; padding: 36px 20px; color: #aaa; }
    .state-box.error { color: #c62828; }
    .state-box p { margin-top: 10px; font-size: .9rem; }
    .spinner {
      display: inline-block; width: 26px; height: 26px;
      border: 3px solid #e0e0e0; border-top-color: #03c75a;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }

    /* ── 정렬 컨트롤 ── */
    .sort-bar {
      display: flex; gap: 8px; align-items: center;
      margin-bottom: 10px; flex-wrap: wrap;
    }
    .sort-label { font-size: .8rem; color: #888; }
    .sort-btn {
      padding: 4px 12px; border: 1.5px solid #dde1e7;
      border-radius: 14px; font-size: .8rem; font-weight: 600;
      color: #555; background: #fff; cursor: pointer; transition: all .15s;
    }
    .sort-btn:hover  { border-color: #03c75a; color: #03c75a; }
    .sort-btn.active { background: #03c75a; border-color: #03c75a; color: #fff; }

    /* ── 차트 ── */
    .chart-wrap { width: 100%; height: 200px; margin-bottom: 16px; position: relative; }
    canvas.price-chart { width: 100% !important; height: 100% !important; }

    /* ── 반응형 ── */
    @media (max-width: 600px) {
      header { padding: 14px 16px; }
      header h1 { font-size: 1.1rem; }
      .container { padding: 16px 12px; }
      .card { padding: 14px; }
      .search-box button { padding: 13px 16px; }
      .complex-header { flex-direction: column; gap: 8px; }
      .complex-header .info .stats { grid-template-columns: 1fr 1fr; }
      .price-stats { gap: 6px; }
      .price-stat-box { padding: 6px 8px; }
      .pyeong-tab { padding: 6px 11px; font-size: .8rem; }
      .price-table { font-size: .8rem; }
      .price-table th, .price-table td { padding: 7px 8px; }
      .sort-bar { gap: 6px; }
      .sort-btn { padding: 4px 9px; font-size: .76rem; }
      .chart-wrap { height: 160px; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>

<header>
  <div style="display:flex;justify-content:space-between;align-items:center">
    <div>
      <h1>아파트 매물 조회</h1>
      <p>네이버 부동산 기준 · 평형별 실거래가 &amp; 매도호가</p>
    </div>
    <button onclick="showFavorites()" id="headerFavBtn"
      style="background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.4);
             color:#fff;border-radius:10px;padding:8px 14px;font-size:.85rem;
             font-weight:700;cursor:pointer;white-space:nowrap">
      ⭐ 즐겨찾기
    </button>
  </div>
</header>

<div class="container">

  <div class="search-box">
    <input
      type="text"
      id="searchInput"
      placeholder="아파트 단지명 입력 (예: 헬리오시티, 래미안)"
      autocomplete="off"
    />
    <button id="searchBtn" onclick="doSearch()">검색</button>
  </div>

  <!-- 즐겨찾기 -->
  <div id="favSection" class="card hidden">
    <div class="fav-section-label">⭐ 즐겨찾기</div>
    <ul id="favList" class="complex-list"></ul>
  </div>

  <!-- 단지 목록 -->
  <div id="listCard" class="card hidden">
    <div id="listLabel" class="section-label">검색 결과</div>
    <ul id="complexList" class="complex-list"></ul>
  </div>

  <!-- 단지 상세 -->
  <div id="detailSection" class="hidden">

    <!-- 단지 정보 + 평형 탭 -->
    <div class="card">
      <div class="complex-header">
        <span class="badge">선택된 단지</span>
        <div class="info">
          <div class="name-row">
            <div class="name" id="selName"></div>
            <button class="fav-btn-header" id="favBtn" onclick="toggleFavorite()" title="즐겨찾기">☆</button>
          </div>
          <div class="addr" id="selAddr"></div>
          <div class="stats" id="selStats"></div>
        </div>
      </div>
      <div class="tab-label">평형 선택</div>
      <div id="pyeongTabs" class="pyeong-tabs"></div>
    </div>

    <!-- 가격 영역 -->
    <div id="priceArea"></div>

  </div>

</div>

<script>
  // ── 상수 ───────────────────────────────────────────────
  const HEAT_METHOD = {
    HT001: '중앙난방', HT002: '지역난방', HT003: '개별난방',
    HT004: '중앙+개별', HT005: '개별난방',
  };

  // ── 전역 상태 ──────────────────────────────────────────
  let currentComplex  = null;
  let pyeongs         = [];
  let selectedPyeongs = new Set();
  let askSortKey      = 'rank';
  let askGroupDup     = true;
  let chartInstances  = {};

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  // ── 즐겨찾기 ───────────────────────────────────────────
  function getFavorites() {
    try { return JSON.parse(localStorage.getItem('aptFavorites') || '[]'); }
    catch { return []; }
  }
  function saveFavorites(list) {
    localStorage.setItem('aptFavorites', JSON.stringify(list));
  }
  function isFavorite(complexNo) {
    return getFavorites().some(f => f.complexNo === complexNo);
  }
  function toggleFavorite() {
    if (!currentComplex) return;
    const favs = getFavorites();
    const idx = favs.findIndex(f => f.complexNo === currentComplex.complexNo);
    if (idx >= 0) {
      favs.splice(idx, 1);
    } else {
      favs.unshift({
        complexNo:           currentComplex.complexNo,
        complexName:         currentComplex.complexName,
        address:             currentComplex.address,
        totalHouseholdCount: currentComplex.totalHouseholdCount || '',
      });
      if (favs.length > 15) favs.pop();
    }
    saveFavorites(favs);
    updateFavBtn();
    renderFavSection();
  }
  function updateFavBtn() {
    const btn = document.getElementById('favBtn');
    if (!btn || !currentComplex) return;
    const active = isFavorite(currentComplex.complexNo);
    btn.textContent = active ? '★' : '☆';
    btn.classList.toggle('active', active);
    btn.title = active ? '즐겨찾기 해제' : '즐겨찾기 추가';
  }
  function renderFavSection() {
    const favs = getFavorites();
    const sec  = document.getElementById('favSection');
    const ul   = document.getElementById('favList');
    if (!favs.length) { sec.classList.add('hidden'); return; }
    sec.classList.remove('hidden');
    ul.innerHTML = favs.map((f, i) => `
      <li onclick="loadFavorite(${i})">
        <div class="c-info">
          <div class="c-name">${esc(f.complexName)}</div>
          <div class="c-addr">${esc(f.address)}</div>
          ${f.totalHouseholdCount ? `<div class="c-meta">${f.totalHouseholdCount}세대</div>` : ''}
        </div>
        <button class="fav-del-btn" onclick="removeFav(event,${i})" title="삭제">✕</button>
      </li>`).join('');
  }
  function loadFavorite(i) {
    const f = getFavorites()[i];
    if (f) loadComplex(f);
  }
  function removeFav(e, i) {
    e.stopPropagation();
    const favs = getFavorites();
    favs.splice(i, 1);
    saveFavorites(favs);
    renderFavSection();
    if (currentComplex) updateFavBtn();
  }

  function showFavorites() {
    renderFavSection();
    const sec = document.getElementById('favSection');
    if (getFavorites().length) {
      sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
    } else {
      alert('즐겨찾기한 단지가 없습니다.\n단지 조회 후 ☆ 버튼을 눌러 추가하세요.');
    }
  }

  // 페이지 로드 시 즐겨찾기 표시
  renderFavSection();

  // ── 검색 ───────────────────────────────────────────────
  async function doSearch() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q) return;
    setSearchBtn(true);
    hideDetail();
    setListLoading('단지 검색 중…');
    try {
      const data = await apiFetch(`/api/search?query=${encodeURIComponent(q)}`);
      renderComplexList(data.complexes || []);
    } catch (e) {
      setListError(e.message);
    } finally {
      setSearchBtn(false);
    }
  }

  function renderComplexList(list) {
    const card  = document.getElementById('listCard');
    const label = document.getElementById('listLabel');
    const ul    = document.getElementById('complexList');
    card.classList.remove('hidden');

    if (!list.length) {
      label.textContent = '검색 결과 없음';
      ul.innerHTML = '<li style="color:#aaa;padding:12px">검색 결과가 없습니다.</li>';
      return;
    }
    if (list.length === 1) {
      card.classList.add('hidden');
      loadComplex(list[0]);
      return;
    }
    label.textContent = `검색 결과 ${list.length}건 · 단지를 선택하세요`;
    window._complexList = list;
    ul.innerHTML = list.map((c, i) => `
      <li onclick="pickComplex(${i})">
        <div class="c-info">
          <div class="c-name">${esc(c.complexName)}</div>
          <div class="c-addr">${esc(c.address)}</div>
          <div class="c-meta">${c.totalHouseholdCount ? c.totalHouseholdCount + '세대' : ''}</div>
        </div>
      </li>`).join('');
  }

  function pickComplex(i) {
    document.getElementById('listCard').classList.add('hidden');
    loadComplex(window._complexList[i]);
  }

  // ── 단지 로드 ──────────────────────────────────────────
  async function loadComplex(c) {
    currentComplex = c;
    document.getElementById('selName').textContent = c.complexName;
    document.getElementById('selAddr').textContent = c.address;
    document.getElementById('selStats').innerHTML = '';
    document.getElementById('detailSection').classList.remove('hidden');
    document.getElementById('pyeongTabs').innerHTML =
      '<div class="state-box"><div class="spinner"></div><p>평형 로딩…</p></div>';
    document.getElementById('priceArea').innerHTML = '';
    updateFavBtn();

    try {
      const [overview, detail] = await Promise.allSettled([
        apiFetch(`/api/complex/${c.complexNo}/overview`),
        apiFetch(`/api/complex/${c.complexNo}/detail`),
      ]);
      const ov = overview.status === 'fulfilled' ? overview.value : {};
      const dt = detail.status === 'fulfilled' ? detail.value : {};
      // overview의 추가 정보를 currentComplex에 병합
      currentComplex = { ...c, totalHouseholdCount: ov.totalHouseHoldCount };
      renderOverviewStats(ov, dt);
      pyeongs = (ov.pyeongs || []).sort((a, b) =>
        parseFloat(a.exclusiveArea) - parseFloat(b.exclusiveArea)
      );
      renderPyeongTabs();
    } catch (e) {
      document.getElementById('pyeongTabs').innerHTML =
        `<div class="state-box error"><p>평형 로딩 실패: ${esc(e.message)}</p></div>`;
    }
  }

  function renderOverviewStats(ov, dt) {
    dt = dt || {};
    const stats = document.getElementById('selStats');
    // 주차: parkingCountByHousehold (overview) 또는 dt에서 찾기
    const cd = dt.complexDetail || dt;
    const parking = ov.parkingCountByHousehold || cd.parkingCountByHousehold || null;
    const heat    = ov.heatMethodTypeName || cd.heatMethodTypeName
      || HEAT_METHOD[cd.heatMethodTypeCode] || null;
    const builder = ov.constructionCompanyName || cd.constructionCompanyName || null;

    const items = [
      ov.totalHouseHoldCount &&
        { label: '세대수', value: ov.totalHouseHoldCount.toLocaleString() + '세대' },
      ov.useApproveYmd &&
        { label: '준공', value: formatYmd(ov.useApproveYmd) },
      ov.totalDongCount &&
        { label: '동수', value: ov.totalDongCount + '개동' },
      parking &&
        { label: '세대당주차', value: parseFloat(parking).toFixed(2) + '대' },
      heat &&
        { label: '난방', value: heat },
      builder &&
        { label: '건설사', value: builder },
      (ov.minPriceByLetter && ov.maxPriceByLetter) &&
        { label: '매매가', value: ov.minPriceByLetter + ' ~ ' + ov.maxPriceByLetter },
      (ov.minLeasePriceByLetter && ov.maxLeasePriceByLetter) &&
        { label: '전세가', value: ov.minLeasePriceByLetter + ' ~ ' + ov.maxLeasePriceByLetter },
    ].filter(Boolean);

    stats.innerHTML = items.map(it =>
      `<div class="stat-item">${it.label}<span>${esc(String(it.value))}</span></div>`
    ).join('');
  }

  // ── 평형 탭 ────────────────────────────────────────────
  function renderPyeongTabs() {
    const tabsEl = document.getElementById('pyeongTabs');
    if (!pyeongs.length) {
      tabsEl.innerHTML = '<span style="color:#aaa;font-size:.85rem">평형 정보 없음</span>';
      loadPricesMulti([]);
      return;
    }
    selectedPyeongs = new Set([0]);
    tabsEl.innerHTML = pyeongs.map((p, i) => {
      const excl  = p.exclusiveArea ? parseFloat(p.exclusiveArea).toFixed(1) : '?';
      const suppl = p.supplyArea    ? parseFloat(p.supplyArea).toFixed(1)    : '?';
      const label = `${suppl}㎡<br><small style="font-weight:400;font-size:.75em">전용 ${excl}㎡</small>`;
      return `<button class="pyeong-tab ${i === 0 ? 'active' : ''}"
        onclick="togglePyeong(${i})">${label}</button>`;
    }).join('');
    loadPricesMulti([0]);
  }

  function togglePyeong(idx) {
    if (selectedPyeongs.has(idx)) {
      if (selectedPyeongs.size === 1) return;
      selectedPyeongs.delete(idx);
    } else {
      selectedPyeongs.add(idx);
    }
    document.querySelectorAll('.pyeong-tab').forEach((el, i) =>
      el.classList.toggle('active', selectedPyeongs.has(i))
    );
    loadPricesMulti([...selectedPyeongs].sort((a,b) => a-b));
  }

  // ── 가격 정보 로드 (다중 평형) ────────────────────────
  async function loadPricesMulti(idxList) {
    Object.values(chartInstances).forEach(c => c.destroy());
    chartInstances = {};

    const priceArea = document.getElementById('priceArea');
    priceArea.innerHTML = `<div class="card"><div class="state-box">
      <div class="spinner"></div><p>가격 정보 로딩 중…</p></div></div>`;

    const no = currentComplex.complexNo;
    const selectedList = idxList.map(i => pyeongs[i]).filter(Boolean);

    const results = await Promise.all(selectedList.map(p => {
      const areaNo = p ? p.pyeongNo : 0;
      return Promise.allSettled([
        apiFetch(`/api/articles/${no}?tradeType=A1&areaNos=${areaNo}`),
        apiFetch(`/api/real-prices/${no}?tradeType=A1&areaNo=${areaNo}`),
      ]);
    }));

    priceArea.innerHTML = '';

    selectedList.forEach((p, si) => {
      const [askRes, realRes] = results[si];
      const pyeongName = p ? p.pyeongName : '';

      if (selectedList.length > 1) {
        const header = document.createElement('div');
        header.style.cssText = 'font-size:.95rem;font-weight:700;color:#03c75a;margin:16px 0 8px;padding-left:4px';
        header.textContent = `▪ ${pyeongName} 평형`;
        priceArea.appendChild(header);
      }

      const grid = document.createElement('div');
      grid.className = 'price-grid';

      const realCard = document.createElement('div');
      realCard.className = 'card';
      const chartId = `chart-${p ? p.pyeongNo : 'all'}-${si}`;

      if (realRes.status === 'fulfilled') {
        realCard.innerHTML = renderRealPrices(realRes.value, pyeongName, chartId);
        grid.appendChild(realCard);
        grid.appendChild(createAskCard(askRes, pyeongName));
        priceArea.appendChild(grid);
        requestAnimationFrame(() => drawRealPriceChart(realRes.value, chartId));
      } else {
        realCard.innerHTML = errSection('최근 실거래가', realRes.reason?.message);
        grid.appendChild(realCard);
        grid.appendChild(createAskCard(askRes, pyeongName));
        priceArea.appendChild(grid);
      }
    });
  }

  function createAskCard(askRes, pyeongName) {
    const askCard = document.createElement('div');
    askCard.className = 'card';
    askCard.innerHTML = askRes.status === 'fulfilled'
      ? renderAskPrices(askRes.value, pyeongName, currentComplex.complexNo)
      : errSection('매도 호가', askRes.reason?.message);
    return askCard;
  }

  // ── 실거래가 렌더링 ────────────────────────────────────
  function renderRealPrices(data, pyeongName, chartId) {
    const monthGroups = data?.realPriceOnMonthList || [];
    const allPrices = monthGroups.flatMap(m => m.realPriceList || []);

    if (!allPrices.length) {
      return `<div class="section-title">최근 실거래가</div>
        <div class="state-box"><p>최근 거래 내역이 없습니다.</p></div>`;
    }

    // 통계 계산
    const prices = allPrices.map(p => p.dealPrice).filter(Boolean);
    const avg  = prices.length ? Math.round(prices.reduce((a,b) => a+b, 0) / prices.length) : null;
    const high = prices.length ? Math.max(...prices) : null;
    const low  = prices.length ? Math.min(...prices) : null;

    const statsHtml = prices.length ? `
      <div class="price-stats">
        <div class="price-stat-box avg">
          <div class="ps-label">평균</div>
          <div class="ps-value">${fmtWon(avg)}</div>
        </div>
        <div class="price-stat-box high">
          <div class="ps-label">최고</div>
          <div class="ps-value">${fmtWon(high)}</div>
        </div>
        <div class="price-stat-box low">
          <div class="ps-label">최저</div>
          <div class="ps-value">${fmtWon(low)}</div>
        </div>
      </div>` : '';

    const rows = allPrices.slice(0, 20).map(p => {
      const dateStr = p.formattedTradeYearMonth ||
        (p.tradeYear && p.tradeMonth ? `${p.tradeYear}.${String(p.tradeMonth).padStart(2,'0')}.${p.tradeDate||''}` : '-');
      const priceStr = p.formattedPrice || (p.dealPrice ? fmtWon(p.dealPrice) : '-');
      return `<tr>
        <td>${esc(dateStr)}</td>
        <td class="price-blue">${esc(priceStr)}</td>
        <td>${p.floor || '-'}층</td>
      </tr>`;
    }).join('');

    return `
      <div class="section-title">최근 실거래가${pyeongName ? ' (' + esc(pyeongName) + ')' : ''} (${allPrices.length}건)</div>
      ${statsHtml}
      <div class="chart-wrap"><canvas id="${chartId}" class="price-chart"></canvas></div>
      <div class="tbl-wrap">
        <table class="price-table">
          <thead><tr><th>거래일</th><th>거래가</th><th>층</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  // ── 실거래가 차트 ──────────────────────────────────────
  function drawRealPriceChart(data, chartId) {
    const canvas = document.getElementById(chartId);
    if (!canvas) return;
    const monthGroups = data?.realPriceOnMonthList || [];
    const allPrices = monthGroups.flatMap(m => m.realPriceList || []).slice(0, 20).reverse();

    const labels = allPrices.map(p =>
      p.formattedTradeYearMonth ||
      (p.tradeYear && p.tradeMonth ? `${p.tradeYear}.${String(p.tradeMonth).padStart(2,'0')}` : '')
    );
    const values = allPrices.map(p => p.dealPrice ? p.dealPrice / 10000 : null);

    chartInstances[chartId] = new Chart(canvas, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: '실거래가 (억)',
          data: values,
          borderColor: '#03c75a',
          backgroundColor: 'rgba(3,199,90,0.08)',
          pointBackgroundColor: '#03c75a',
          pointRadius: 4,
          tension: 0.3,
          fill: true,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { font: { size: 10 }, maxRotation: 45 } },
          y: {
            ticks: {
              font: { size: 10 },
              callback: v => v + '억'
            }
          }
        }
      }
    });
  }

  // ── 매도호가 렌더링 ────────────────────────────────────
  function renderAskPrices(data, pyeongName, complexNo) {
    let list = data?.articleList || [];

    if (!list.length) {
      return `<div class="section-title">매도 호가</div>
        <div class="state-box"><p>현재 매물이 없습니다.</p></div>`;
    }

    const grouped = askGroupDup ? groupDuplicates(list) : list.map(a => ({...a, _dupCount: 1}));
    const sortedList = sortArticles(grouped, askSortKey);

    const rows = sortedList.slice(0, 100).map(a => {
      const url = a.articleNo && complexNo
        ? `https://new.land.naver.com/complexes/${complexNo}?articleNo=${a.articleNo}`
        : '';
      const floorDong = [a.buildingName, a.floorInfo].filter(Boolean).join(' ');
      const dupCnt = a.sameAddrCnt || a._dupCount || 1;
      const dupBadge = dupCnt > 1
        ? `<div style="font-size:.72rem;color:#aaa;margin-top:2px">중개사 ${dupCnt}곳</div>` : '';
      return `
      <tr ${url ? `class="clickable-row" onclick="window.open('${url}','_blank')"` : ''}>
        <td>${tradeTag(a.tradeTypeName || a.tradeTypeCode)}</td>
        <td><span class="price-red">${esc(a.dealOrWarrantPrc || '-')}</span>${dupBadge}</td>
        <td>${esc(a.areaName ? a.areaName + '㎡' : '-')}</td>
        <td>${esc(floorDong || '-')}</td>
        <td>${esc(a.direction || '-')}</td>
      </tr>`;
    }).join('');

    const totalCount = askGroupDup ? sortedList.length : list.length;
    const origCount  = list.length;
    const countLabel = askGroupDup && origCount !== totalCount
      ? `${totalCount}건 <span style="font-size:.78rem;color:#aaa">(중복 제외 전 ${origCount}건)</span>`
      : `${origCount}건`;

    return `
      <div class="section-title">매도 호가${pyeongName ? ' (' + esc(pyeongName) + ')' : ''} (${countLabel})</div>
      <div style="font-size:.75rem;color:#aaa;margin-bottom:6px">※ 최대 100건까지 조회됩니다.</div>
      <div class="sort-bar">
        <span class="sort-label">정렬:</span>
        <button class="sort-btn ${askSortKey==='rank'?'active':''}"      onclick="changeAskSort('rank')">기본순</button>
        <button class="sort-btn ${askSortKey==='price_asc'?'active':''}" onclick="changeAskSort('price_asc')">가격 낮은순</button>
        <button class="sort-btn ${askSortKey==='price_desc'?'active':''}"onclick="changeAskSort('price_desc')">가격 높은순</button>
        <button class="sort-btn ${askSortKey==='date_desc'?'active':''}" onclick="changeAskSort('date_desc')">최신등록순</button>
        <button class="sort-btn ${askGroupDup?'active':''}" onclick="toggleDupGroup()" style="margin-left:8px">✓ 동일매물 묶기</button>
      </div>
      <div class="tbl-wrap">
        <table class="price-table">
          <thead><tr><th>유형</th><th>가격</th><th>면적</th><th>층</th><th>방향</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  function sortArticles(list, key) {
    const arr = [...list];
    if (key === 'price_asc')  return arr.sort((a, b) => parsePrice(a.dealOrWarrantPrc) - parsePrice(b.dealOrWarrantPrc));
    if (key === 'price_desc') return arr.sort((a, b) => parsePrice(b.dealOrWarrantPrc) - parsePrice(a.dealOrWarrantPrc));
    if (key === 'date_desc')  return arr.sort((a, b) => (b.articleConfirmYmd||'').localeCompare(a.articleConfirmYmd||''));
    return arr;
  }

  function parsePrice(str) {
    if (!str) return 0;
    const eok = str.match(/(\d+)억/);
    const man = str.match(/억\s*([\d,]+)/);
    return (eok ? parseInt(eok[1]) * 10000 : 0) + (man ? parseInt(man[1].replace(/,/g,'')) : 0);
  }

  function changeAskSort(key) {
    askSortKey = key;
    loadPricesMulti([...selectedPyeongs].sort((a,b) => a-b));
  }

  function toggleDupGroup() {
    askGroupDup = !askGroupDup;
    loadPricesMulti([...selectedPyeongs].sort((a,b) => a-b));
  }

  function groupDuplicates(list) {
    const map = new Map();
    for (const a of list) {
      const key = [a.buildingName||'', a.floorInfo||'', a.dealOrWarrantPrc||'', a.areaName||''].join('|');
      if (!map.has(key)) {
        map.set(key, {...a, _dupCount: 1});
      } else {
        map.get(key)._dupCount++;
      }
    }
    return [...map.values()];
  }

  // ── 유틸 ───────────────────────────────────────────────
  async function apiFetch(url) {
    const res  = await fetch(url);
    const text = await res.text();
    let json;
    try { json = JSON.parse(text); }
    catch { throw new Error('파싱 오류: ' + text.slice(0, 80)); }
    if (!res.ok) throw new Error(json?.error || `HTTP ${res.status}`);
    return json;
  }

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function fmtWon(n) {
    if (!n) return '-';
    const eok = Math.floor(n / 10000);
    const man = n % 10000;
    if (eok > 0 && man > 0) return `${eok}억 ${man.toLocaleString()}`;
    if (eok > 0) return `${eok}억`;
    return `${man.toLocaleString()}만`;
  }

  function formatYmd(ymd) {
    if (!ymd || ymd.length < 4) return ymd;
    return ymd.slice(0, 4) + '년';
  }

  function tradeTag(t) {
    if (!t) return '';
    if (t === 'A1' || t.includes('매매')) return `<span class="tag tag-sell">매매</span>`;
    if (t === 'B1' || t.includes('전세')) return `<span class="tag tag-charter">전세</span>`;
    if (t === 'B2' || t.includes('월세')) return `<span class="tag tag-rent">월세</span>`;
    return `<span class="tag tag-sell">${esc(t)}</span>`;
  }

  function errSection(title, msg) {
    return `<div class="section-title">${title}</div>
      <div class="state-box error"><p>${esc(msg || '불러오기 실패')}</p></div>`;
  }

  function setListLoading(msg) {
    document.getElementById('listCard').classList.remove('hidden');
    document.getElementById('listLabel').textContent = '';
    document.getElementById('complexList').innerHTML =
      `<li><div class="state-box"><div class="spinner"></div><p>${msg}</p></div></li>`;
  }

  function setListError(msg) {
    document.getElementById('listCard').classList.remove('hidden');
    document.getElementById('listLabel').textContent = '오류';
    document.getElementById('complexList').innerHTML =
      `<li><div class="state-box error"><p>${esc(msg)}</p></div></li>`;
  }

  function hideDetail() {
    document.getElementById('detailSection').classList.add('hidden');
    document.getElementById('priceArea').innerHTML = '';
  }

  function setSearchBtn(loading) {
    const btn = document.getElementById('searchBtn');
    btn.disabled = loading;
    btn.textContent = loading ? '검색 중…' : '검색';
  }
</script>

</body>
